    <!-- Prevent FOUC (Flash of Unstyled Content) for Dark Mode.
         ponytail: externalized to drop 'unsafe-inline'; render-blocking (no defer) so it runs before paint -->
    <script src="/fouc.js"></script>

    <!-- ponytail: meta CSP for the statically-served SPA; no nonce possible on a static file.
         localhost/127.0.0.1:8000 are dev-only (backend APP_URL in local env);
         they never serve the prod page, so they're inert in production but
         required for local e2e where the API answers with absolute :8000 URLs. -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob: http://localhost:8000 http://127.0.0.1:8000; connect-src 'self' http://localhost:8000 http://127.0.0.1:8000 https://bemfasilkomunsri.org https://www.bemfasilkomunsri.org https://ilkomnews.bemfasilkomunsri.org; frame-src 'none'; object-src 'none'; base-uri 'self'">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
